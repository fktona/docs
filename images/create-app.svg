<svg xmlns="http://www.w3.org/2000/svg" width="1182" height="367" viewBox="0 0 1182 367" aria-label="Vela animated logo">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa">
        <animate attributeName="stop-color" values="#a78bfa;#7c3aed" dur="2.2s" repeatCount="1" fill="freeze"/>
      </stop>
      <stop offset="100%" stop-color="#7c3aed">
        <animate attributeName="stop-color" values="#7c3aed;#c4b5fd" dur="2.2s" repeatCount="1" fill="freeze"/>
      </stop>
    </linearGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fafaf9" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#fafaf9" stop-opacity="0.85"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-1 0;1 0" dur="2.2s" repeatCount="1" fill="freeze"/>
    </linearGradient>

    <clipPath id="vFillClip">
      <rect x="0" y="367" width="460" height="0">
        <animate attributeName="y" values="367;40" dur="2.2s" repeatCount="1" fill="freeze"/>
        <animate attributeName="height" values="0;327" dur="2.2s" repeatCount="1" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>

  <text
    x="20"
    y="205"
    text-anchor="start"
    dominant-baseline="middle"
    font-family="Georgia, serif"
    font-size="600"
    font-style="italic"
    font-weight="400"
    fill="#4c1d95"
    letter-spacing="-1px"
    opacity="0.45"
  >
    v
  </text>

  <g clip-path="url(#vFillClip)">
    <text
      x="20"
      y="205"
      text-anchor="start"
      dominant-baseline="middle"
      font-family="Georgia, serif"
      font-size="600"
      font-style="italic"
      font-weight="400"
      fill="url(#accent)"
      letter-spacing="-1px"
      filter="url(#glow)"
    >
      v
    </text>
  </g>

  <text
    x="440"
    y="212"
    text-anchor="start"
    dominant-baseline="middle"
    font-family="Inter, sans-serif"
    font-size="300"
    font-style="italic"
    font-weight="500"
    fill="url(#shimmer)"
    letter-spacing="-0.5px"
  >
    vela
    <animate attributeName="opacity" values="0.88;1" dur="2.2s" repeatCount="1" fill="freeze"/>
  </text>
</svg>
