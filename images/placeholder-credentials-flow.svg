<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" fill="none">
  <rect width="800" height="320" rx="12" fill="#fafaf9"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#18181b" font-family="system-ui" font-size="16" font-weight="700">Authentication Flow</text>

  <!-- Client Secret Path -->
  <text x="200" y="80" text-anchor="middle" fill="#7c3aed" font-family="system-ui" font-size="13" font-weight="600">Client Secret (Management)</text>

  <rect x="60" y="100" width="130" height="50" rx="8" fill="#18181b"/>
  <text x="125" y="130" text-anchor="middle" fill="#fafaf9" font-family="system-ui" font-size="12" font-weight="500">Your Server</text>

  <line x1="190" y1="125" x2="240" y2="125" stroke="#a78bfa" stroke-width="2"/>
  <polygon points="238,119 250,125 238,131" fill="#a78bfa"/>

  <rect x="250" y="95" width="150" height="60" rx="8" fill="#a78bfa"/>
  <text x="325" y="120" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12" font-weight="600">Authorization:</text>
  <text x="325" y="140" text-anchor="middle" fill="#ede9fe" font-family="system-ui" font-size="11">Bearer vela_cs_...</text>

  <!-- Divider -->
  <line x1="50" y1="180" x2="750" y2="180" stroke="#e5e5e5" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- API Key Path -->
  <text x="200" y="210" text-anchor="middle" fill="#7c3aed" font-family="system-ui" font-size="13" font-weight="600">API Key (Ingestion)</text>

  <rect x="60" y="230" width="130" height="50" rx="8" fill="#18181b"/>
  <text x="125" y="260" text-anchor="middle" fill="#fafaf9" font-family="system-ui" font-size="12" font-weight="500">Your Server</text>

  <line x1="190" y1="255" x2="240" y2="255" stroke="#a78bfa" stroke-width="2"/>
  <polygon points="238,249 250,255 238,261" fill="#a78bfa"/>

  <rect x="250" y="225" width="150" height="60" rx="8" fill="#a78bfa"/>
  <text x="325" y="250" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12" font-weight="600">x-api-key:</text>
  <text x="325" y="270" text-anchor="middle" fill="#ede9fe" font-family="system-ui" font-size="11">vela_live_...</text>

  <!-- Both arrows to API -->
  <line x1="400" y1="125" x2="520" y2="160" stroke="#a78bfa" stroke-width="2"/>
  <polygon points="516,154 528,160 518,166" fill="#a78bfa"/>

  <line x1="400" y1="255" x2="520" y2="200" stroke="#a78bfa" stroke-width="2"/>
  <polygon points="516,194 528,200 518,206" fill="#a78bfa"/>

  <!-- Vela API -->
  <rect x="530" y="140" width="180" height="80" rx="8" fill="#7c3aed"/>
  <text x="620" y="175" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="16" font-weight="700">Vela API</text>
  <text x="620" y="198" text-anchor="middle" fill="#ede9fe" font-family="system-ui" font-size="11">Validates credentials</text>
</svg>
